name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions: {}

jobs:
  release:
    name: Release
    uses: grafana/xk6/.github/workflows/tooling-release.yml@1556f094f3883e37ebff04b967fddac30681c466 # v1.4.1
    permissions:
      contents: write
      packages: write
      id-token: write
    with:
      go-version: "1.25.x"
      goreleaser-version: "2.8.2"
      k6-versions: '["v1.2.3","v1.0.0"]'